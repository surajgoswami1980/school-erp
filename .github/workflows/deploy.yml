name: Deploy NestJS to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t nest-app-v1 .

      - name: Save Docker image
        run: docker save nest-app-v1 > nest-app-v1.tar
      # 🔍 Debug (IMPORTANT)
      - name: Check files
        run: ls -la
      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: 'nest-app-v1.tar'
          target: '/home/ubuntu/'

      - name: SSH Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu
            docker stop nest-app || true
            docker rm nest-app || true
            docker rmi nest-app-v1 || true
            docker load < nest-app-v1.tar
            docker run -d -p 3000:3000 --restart always --name nest-app nest-app-v1
